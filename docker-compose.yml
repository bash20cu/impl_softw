services:
  postgres:
    image: postgres:16-alpine
    container_name: clinicaplus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinicaplus}
      POSTGRES_USER: ${POSTGRES_USER:-clinic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic_password}
    ports:
      - "5432:5432"
    volumes:
      - clinicaplus_postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic_user} -d ${POSTGRES_DB:-clinicaplus}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clinicaplus_postgres_data:
